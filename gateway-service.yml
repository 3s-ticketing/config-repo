server:
  port: 10000

spring:
  application:
    name: gateway-service

  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: http://localhost:18080/realms/ticketing

  cloud:
    gateway:
      server:
        webflux:
          routes:
            - id: user-service
              uri: lb://USER-SERVICE
              predicates:
                - Path=/api/users,/api/users/**,/api/auth,/api/auth/**

            - id: club-service
              uri: lb://CLUB-SERVICE
              predicates:
                - Path=/api/clubs,/api/clubs/**,/api/stadiums,/api/stadiums/**

            - id: match-service
              uri: lb://MATCH-SERVICE
              predicates:
                - Path=/api/matches,/api/matches/**

            - id: seat-service
              uri: lb://SEAT-SERVICE
              predicates:
                - Path=/api/seats,/api/seats/**,/api/seat-grades,/api/seat-grades/**

            - id: reservation-service
              uri: lb://RESERVATION-SERVICE
              predicates:
                - Path=/api/reservations,/api/reservations/**,/api/reservation-seats,/api/reservation-seats/**

            - id: queue-service
              uri: lb://QUEUE-SERVICE
              predicates:
                - Path=/api/queues,/api/queues/**

            - id: payment-service
              uri: lb://PAYMENT-SERVICE
              predicates:
                - Path=/api/payments,/api/payments/**

eureka:
  client:
    enabled: true
    register-with-eureka: true
    fetch-registry: true
    service-url:
      defaultZone: http://localhost:10001/eureka/
      
